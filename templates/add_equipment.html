{% extends "base.html" %}

{% block title %}Add Equipment · MediTrack{% endblock %}

{% block content %}
  <div class="page-header">
    <div>
      <h1>Add Equipment</h1>
      <p class="subtitle">Register a new asset in the inventory</p>
    </div>
  </div>

  <div class="card">
    <form method="post">
      <div class="form-grid">
        <div class="form-field">
          <label for="equipment_name">Equipment name</label>
          <input type="text" id="equipment_name" name="equipment_name" placeholder="e.g. Ventilator" required>
        </div>

        <div class="form-field">
          <label for="serial_number">Serial number</label>
          <input type="text" id="serial_number" name="serial_number" placeholder="e.g. VEN-1042" required>
        </div>

        <div class="form-field">
          <label for="department">Department</label>
          <input type="text" id="department" name="department" placeholder="e.g. ICU" required>
        </div>

        <div class="form-field">
          <label for="purchase_date">Purchase date</label>
          <input type="date" id="purchase_date" name="purchase_date" required>
        </div>

        <div class="form-field">
          <label for="status">Status</label>
          <select id="status" name="status">
            {% for s in statuses %}
              <option value="{{ s }}" {{ 'selected' if s == 'Active' }}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn btn-primary">Save equipment</button>
        <a href="{{ url_for('equipment_list') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
