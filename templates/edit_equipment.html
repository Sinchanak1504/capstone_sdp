{% extends "base.html" %}
{% import "_macros.html" as macros %}

{% block title %}Edit Equipment · MediTrack{% endblock %}

{% block content %}
  <div class="page-header">
    <div>
      <h1>Edit Equipment</h1>
      <p class="subtitle">
        <span class="serial">{{ equipment.serial_number }}</span> · currently {{ macros.status_tag(equipment.status) }}
      </p>
    </div>
  </div>

  <div class="card">
    <form method="post">
      <div class="form-grid">
        <div class="form-field">
          <label for="equipment_name">Equipment name</label>
          <input type="text" id="equipment_name" name="equipment_name" value="{{ equipment.equipment_name }}" required>
        </div>

        <div class="form-field">
          <label>Serial number</label>
          <input type="text" value="{{ equipment.serial_number }}" disabled>
        </div>

        <div class="form-field">
          <label for="department">Department</label>
          <input type="text" id="department" name="department" value="{{ equipment.department }}" required>
        </div>

        <div class="form-field">
          <label for="status">Status</label>
          <select id="status" name="status">
            {% for s in statuses %}
              <option value="{{ s }}" {{ 'selected' if s == equipment.status }}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn btn-primary">Save changes</button>
        <a href="{{ url_for('equipment_detail', equipment_id=equipment.equipment_id) }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
