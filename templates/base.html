<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MediTrack{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <span class="mark">Mx</span>
      <span>MediTrack</span>
    </div>
    <nav>
      <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">Dashboard</a>
      <a href="{{ url_for('equipment_list') }}" class="{{ 'active' if request.endpoint in ['equipment_list', 'equipment_detail', 'edit_equipment'] }}">Equipment</a>
      <a href="{{ url_for('add_equipment') }}" class="{{ 'active' if request.endpoint == 'add_equipment' }}">Add Equipment</a>
    </nav>
  </div>

  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ 'error' if category == 'error' else 'success' }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

</body>
</html>
