# ===========================================================
# Nginx reverse proxy for MediTrack
#
# Install on the EC2 instance:
#   sudo cp deployment/nginx_meditrack.conf /etc/nginx/sites-available/meditrack
#   sudo ln -s /etc/nginx/sites-available/meditrack /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # avoid the default site
#                                                   # also binding port 80
#   sudo nginx -t
#   sudo systemctl restart nginx
#
# Before starting, confirm nothing else (e.g. Apache) is bound to
# port 80:  sudo ss -tlnp | grep :80
# ===========================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /home/ubuntu/MediTrack/static/;
    }
}
